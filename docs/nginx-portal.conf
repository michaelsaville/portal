# /etc/nginx/sites-available/portal
#
# Reverse proxy for portal.pcc2k.com → 127.0.0.1:3006.
# Drop this into sites-available, symlink into sites-enabled, then:
#
#   sudo certbot --nginx -d portal.pcc2k.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Matches the DocHub / TicketHub vhost pattern on 100.91.194.83.
# client_max_body_size is generous because /api/uploads/logo accepts
# up to 5 MB and future ticket attachments could be larger.

server {
    listen 80;
    listen [::]:80;
    server_name portal.pcc2k.com;
    # certbot will add the 443 block + redirect.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.pcc2k.com;

    # ssl_certificate + ssl_certificate_key will be added by certbot.

    client_max_body_size 25m;

    # Security headers — portal is noindex in metadata too.
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    access_log /var/log/nginx/portal.access.log;
    error_log  /var/log/nginx/portal.error.log;

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
